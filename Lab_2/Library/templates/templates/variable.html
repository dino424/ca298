{% extends 'base.html' %}

{% block content %}
     <!-- "{{" and "}}" are used to print out the values of variables in templates --> 
	   <p>The value of x is {{x}}</p>
        <p> x + y = {{z}}</p>

	<!-- assuming we have been passed a variable called x from views.py -->
	 {% if x == 5 %}
      <!-- this html will only be shown to the user if x is 5 -->
	    <p>x is equal to 5</p>
     {% endif %}

{% endblock %}
