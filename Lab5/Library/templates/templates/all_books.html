{% extends "base.html" %}
{% block title %}
  <!-- the page title goes here --> 
{% endblock title%}

{% block content %}
  <!-- content specific to this page goes here --> 
    {% for b in books %}
    <div class="container">

      <div class="card" style="width: 18rem;">
          <div class="card-body">
            <h5 class="card-title">{{ b.title }}</h5>
            <h6 class="card-subtitle mb-2 text-muted">{{b.author }}</h6>
            <p class="card-text">{{b.synopsis}}</p>
          </div>
        </div>
    </div>

    {% endfor %}
{% endblock content%}
